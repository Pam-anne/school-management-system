version: 2.1

# 1. Define the individual Jobs
jobs:
  build:
    docker:
      - image: cimg/openjdk:21.0 
    steps:
      - checkout
      # 'mvn compile' only checks if the code is valid and compiles it
      - run:
          name: Compile Project
          command: mvn compile
      # This saves the compiled code so the next job can use it
      - persist_to_workspace:
          root: .
          paths:
            - .

  test:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      # This retrieves the compiled code from the build job
      - attach_workspace:
          at: .
      - run:
          name: Run JUnit Tests
          command: mvn test

# 2. Orchestrate them in a Workflow
workflows:
  school-system-pipeline:
    jobs:
      - build
      - test:
          requires:
            - build # This ensures 'test' waits for 'build' to finish successfully